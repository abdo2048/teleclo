<!doctype html>
<html lang="en" dir="auto">
<head>
  <meta charset="utf-8">
  <title>Telegraph-like Platform · New Post</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8f9fa;
      --fg: #111827;
      --fg-muted: #6b7280;
      --accent: #2563eb;
      --border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --fg: #e5e7eb;
        --fg-muted: #9ca3af;
        --border: #1e293b;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }
    header {
      margin-bottom: 1.5rem;
    }
    header h1 {
      font-size: 1.4rem;
      margin: 0 0 .25rem;
    }
    header p {
      margin: 0;
      font-size: .9rem;
      color: var(--fg-muted);
    }
    .editor-container {
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: 1rem;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(6px);
      margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      .editor-container {
        background: rgba(15,23,42,0.9);
      }
    }
    .row {
      margin-bottom: .75rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: .85rem;
      font-weight: 500;
      margin-bottom: .25rem;
    }
    input[type="text"] {
      width: 100%;
      border-radius: .5rem;
      border: 1px solid var(--border);
      padding: .6rem .75rem;
      font: inherit;
      color: inherit;
      background: transparent;
    }
    input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
      border-color: transparent;
    }
    .actions {
      display: flex;
      gap: .5rem;
      align-items: center;
      justify-content: flex-start;
      margin-top: .75rem;
    }
    button {
      border-radius: 999px;
      border: none;
      padding: .5rem 1.25rem;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button:disabled {
      opacity: .6;
      cursor: default;
    }
    .status {
      font-size: .8rem;
      color: var(--fg-muted);
    }
    .posts-list {
      margin-top: 2rem;
    }
    .posts-list h2 {
      font-size: 1rem;
      margin: 0 0 .5rem;
    }
    .posts-list ul {
      list-style: none;
      margin: 0;
      padding: 0;
      border-top: 1px solid var(--border);
    }
    .posts-list li {
      padding: .5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: .9rem;
      display: flex;
      justify-content: space-between;
      gap: .5rem;
    }
    .posts-list time {
      font-size: .75rem;
      color: var(--fg-muted);
      white-space: nowrap;
    }
    
    /* RTL support */
    [dir="rtl"] {
      text-align: right;
    }
  </style>
  <link rel="stylesheet" href="./public/css/editor.css">
</head>
<body>
  <div class="page">
    <header>
      <h1>Telegraph-like Platform</h1>
      <p>Privacy-focused, fast publishing. No trackers.</p>
    </header>

    <form id="post-form" autocomplete="off" novalidate>
      <div class="form-group">
        <label for="title">Title (optional)</label>
        <input id="title" name="title" type="text" maxlength="200" placeholder="Type a title or leave empty">
      </div>
      
      <div class="form-group">
        <label>Content</label>
        <div id="editor-container" class="editor-container"></div>
      </div>
      
      <div class="actions">
        <button type="submit" id="submit-btn">Publish</button>
        <span class="status" id="status"></span>
      </div>
    </form>

    <section class="posts-list">
      <h2>Recent posts (on this instance)</h2>
      <ul id="posts"></ul>
    </section>
  </div>

  <script type="module">
    import { HybridEditor } from './src/editor/hybrid-editor.js';
    
    // Initialize the hybrid editor
    const editorContainer = document.getElementById('editor-container');
    const editor = new HybridEditor(editorContainer, {
      enableMarkdownPreview: true,
      enableWysiwyg: true
    });
    
    // Helper: small wrapper around fetch for our API
    async function api(path, options) {
      const res = await fetch(path, {
        ...options,
        headers: {
          "Content-Type": "application/json; charset=utf-8",
          ...(options && options.headers)
        },
        cache: "no-store",
        credentials: "same-origin"
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    const form = document.getElementById("post-form");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const postsList = document.getElementById("posts");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = document.getElementById("title").value.trim();
      
      const content = editor.getContent();
      if (!content.text.trim()) {
        statusEl.textContent = "Content is required.";
        return;
      }
      submitBtn.disabled = true;
      statusEl.textContent = "Publishing…";

      try {
        const data = await api("/.netlify/functions/posts", {
          method: "POST",
          body: JSON.stringify({ 
            title, 
            contentHtml: content.html,
            contentText: content.text
          })
        });
        statusEl.textContent = "Published. Redirecting…";
        window.location.href = data.url;
      } catch (err) {
        console.error(err);
        statusEl.textContent = err.message || "Failed to publish.";
      } finally {
        submitBtn.disabled = false;
      }
    });

    async function loadPosts() {
      try {
        const data = await api("/.netlify/functions/posts", { method: "GET" });
        postsList.innerHTML = "";
        if (!data.posts || !data.posts.length) {
          postsList.innerHTML = "<li>No posts yet on this instance.</li>";
          return;
        }
        for (const post of data.posts) {
          const li = document.createElement("li");
          const link = document.createElement("a");
          link.href = "/post.html?id=" + encodeURIComponent(post.id);
          link.textContent = post.title || "(untitled)";
          const time = document.createElement("time");
          const dt = new Date(post.createdAt);
          time.textContent = dt.toLocaleString([], { hour12: false });
          li.appendChild(link);
          li.appendChild(time);
          postsList.appendChild(li);
        }
      } catch (err) {
        console.error(err);
        postsList.innerHTML = "<li>Failed to load posts.</li>";
      }
    }

    loadPosts();
  </script>
</body>
</html>
