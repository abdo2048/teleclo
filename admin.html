<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Telegraph-like Platform</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafafa;
      --fg: #111827;
      --fg-muted: #6b7280;
      --accent: #2ca9e6;
      --border: #e5e7eb;
      --card-bg: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1014;
        --fg: #e5e7eb;
        --fg-muted: #9ca3af;
        --border: #1e293b;
        --card-bg: #1e293b;
      }
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }
    .auth-controls {
      display: flex;
      gap: 0.75rem;
    }
    .btn {
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      border: 1px solid var(--border);
      background-color: var(--card-bg);
      color: var(--fg);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn:hover {
      background-color: #f3f4f6;
    }
    .btn-primary {
      background-color: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 3fr;
      gap: 1.5rem;
    }
    .sidebar {
      background-color: var(--card-bg);
      border-radius: 0.5rem;
      padding: 1.5rem;
      border: 1px solid var(--border);
    }
    .sidebar h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }
    .nav-item {
      display: block;
      padding: 0.5rem 0;
      color: var(--accent);
      text-decoration: none;
    }
    .nav-item.active {
      font-weight: 600;
    }
    .main-content {
      background-color: var(--card-bg);
      border-radius: 0.5rem;
      padding: 1.5rem;
      border: 1px solid var(--border);
    }
    .section {
      display: none;
    }
    .section.active {
      display: block;
    }
    .posts-list {
      list-style: none;
    }
    .post-item {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }
    .post-item:last-child {
      border-bottom: none;
    }
    .post-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .post-meta {
      font-size: 0.875rem;
      color: var(--fg-muted);
      margin-bottom: 0.5rem;
    }
    .post-actions {
      display: flex;
      gap: 0.5rem;
    }
    .action-btn {
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
    }
    .login-container {
      max-width: 400px;
      margin: 4rem auto;
      padding: 2rem;
      background-color: var(--card-bg);
      border-radius: 0.5rem;
      border: 1px solid var(--border);
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      background-color: var(--bg);
      color: var(--fg);
    }
    .hidden {
      display: none;
    }
    .message {
      padding: 0.75rem;
      border-radius: 0.375rem;
      margin-bottom: 1rem;
    }
    .message.error {
      background-color: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .message.success {
      background-color: #d1fae5;
      color: #065f46;
      border: 1px solid #bbf7d0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Telegraph Admin</div>
      <div class="auth-controls">
        <button id="loginBtn" class="btn">Login</button>
        <button id="logoutBtn" class="btn hidden">Logout</button>
      </div>
    </header>

    <div id="loginView" class="login-container">
      <h2>Login to Your Account</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>
      <div id="loginMessage" class="message hidden"></div>
    </div>

    <div id="adminView" class="dashboard hidden">
      <aside class="sidebar">
        <h2>Menu</h2>
        <a href="#" class="nav-item active" data-section="posts">My Posts</a>
        <a href="#" class="nav-item" data-section="create">Create Post</a>
        <a href="#" class="nav-item" data-section="settings">Settings</a>
      </aside>

      <main class="main-content">
        <section id="postsSection" class="section active">
          <h2>Your Posts</h2>
          <div id="postsList" class="posts-list">
            <!-- Posts will be loaded here -->
          </div>
        </section>

        <section id="createSection" class="section">
          <h2>Create New Post</h2>
          <form id="createPostForm">
            <div class="form-group">
              <label for="postTitle">Title</label>
              <input type="text" id="postTitle" required>
            </div>
            <div class="form-group">
              <label for="postContent">Content</label>
              <textarea id="postContent" rows="10" style="width:100%; padding:0.5rem;" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Publish Post</button>
          </form>
          <div id="createMessage" class="message hidden"></div>
        </section>

        <section id="settingsSection" class="section">
          <h2>Account Settings</h2>
          <p>Manage your account settings here.</p>
        </section>
      </main>
    </div>
  </div>

  <script type="module">
    import { SupabaseAuth } from './src/auth/supabase-auth.js';
    import { DBStorage } from './src/storage/db-storage.js';
    
    // Initialize auth and storage
    const auth = new SupabaseAuth();
    const storage = new DBStorage();
    
    // DOM Elements
    const loginView = document.getElementById('loginView');
    const adminView = document.getElementById('adminView');
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginMessage = document.getElementById('loginMessage');
    const postsList = document.getElementById('postsList');
    const createPostForm = document.getElementById('createPostForm');
    const createMessage = document.getElementById('createMessage');
    const navItems = document.querySelectorAll('.nav-item');
    
    // Check if user is already logged in on page load
    window.addEventListener('DOMContentLoaded', async () => {
      const session = await auth.getCurrentSession();
      if (session) {
        showAdminView();
      } else {
        showLoginView();
      }
    });
    
    // Login form handler
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        await auth.signIn(email, password);
        showAdminView();
      } catch (error) {
        showMessage(loginMessage, error.message, 'error');
      }
    });
    
    // Logout button handler
    logoutBtn.addEventListener('click', async () => {
      try {
        await auth.signOut();
        showLoginView();
      } catch (error) {
        showMessage(loginMessage, error.message, 'error');
      }
    });
    
    // Navigation
    navItems.forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        
        // Remove active class from all items
        navItems.forEach(navItem => navItem.classList.remove('active'));
        
        // Hide all sections
        document.querySelectorAll('.section').forEach(section => {
          section.classList.remove('active');
        });
        
        // Add active class to clicked item
        item.classList.add('active');
        
        // Show corresponding section
        const sectionId = item.getAttribute('data-section') + 'Section';
        document.getElementById(sectionId).classList.add('active');
      });
    });
    
    // Load posts
    async function loadPosts() {
      try {
        const user = await auth.getCurrentUser();
        if (!user) return;
        
        // In a real implementation, we'd get user-specific posts
        // For now, showing all posts since we don't have user isolation in memory storage
        const posts = await storage.listPosts(50);
        postsList.innerHTML = '';
        
        posts.forEach(post => {
          const li = document.createElement('li');
          li.className = 'post-item';
          
          const title = document.createElement('div');
          title.className = 'post-title';
          title.textContent = post.title;
          
          const meta = document.createElement('div');
          meta.className = 'post-meta';
          const date = new Date(post.createdAt);
          meta.textContent = `Created: ${date.toLocaleDateString()} ${date.toLocaleTimeString()}`;
          
          const actions = document.createElement('div');
          actions.className = 'post-actions';
          
          const viewBtn = document.createElement('button');
          viewBtn.className = 'btn action-btn';
          viewBtn.textContent = 'View';
          viewBtn.onclick = () => window.open(`/post.html?id=${post.id}`, '_blank');
          
          const editBtn = document.createElement('button');
          editBtn.className = 'btn action-btn';
          editBtn.textContent = 'Edit';
          editBtn.onclick = () => alert('Edit functionality would go here');
          
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'btn action-btn';
          deleteBtn.textContent = 'Delete';
          deleteBtn.onclick = async () => {
            if (confirm('Are you sure you want to delete this post?')) {
              try {
                await storage.deletePost(post.id);
                loadPosts(); // Refresh the list
              } catch (error) {
                showMessage(createMessage, error.message, 'error');
              }
            }
          };
          
          actions.appendChild(viewBtn);
          actions.appendChild(editBtn);
          actions.appendChild(deleteBtn);
          
          li.appendChild(title);
          li.appendChild(meta);
          li.appendChild(actions);
          postsList.appendChild(li);
        });
      } catch (error) {
        showMessage(createMessage, error.message, 'error');
      }
    }
    
    // Create post form handler
    createPostForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const title = document.getElementById('postTitle').value;
      const content = document.getElementById('postContent').value;
      
      try {
        // In a real implementation, we'd associate the post with the current user
        const post = await storage.createPost({
          title,
          contentHtml: content,
          contentText: content
        });
        
        showMessage(createMessage, 'Post created successfully!', 'success');
        createPostForm.reset();
        
        // Reload posts to show the new one
        loadPosts();
      } catch (error) {
        showMessage(createMessage, error.message, 'error');
      }
    });
    
    // Helper functions
    function showLoginView() {
      loginView.classList.remove('hidden');
      adminView.classList.add('hidden');
      loginBtn.classList.remove('hidden');
      logoutBtn.classList.add('hidden');
    }
    
    function showAdminView() {
      loginView.classList.add('hidden');
      adminView.classList.remove('hidden');
      loginBtn.classList.add('hidden');
      logoutBtn.classList.remove('hidden');
      loadPosts();
    }
    
    function showMessage(element, text, type) {
      element.textContent = text;
      element.className = `message ${type}`;
      element.classList.remove('hidden');
      
      // Auto-hide success messages after 3 seconds
      if (type === 'success') {
        setTimeout(() => {
          element.classList.add('hidden');
        }, 3000);
      }
    }
  </script>
</body>
</html>
