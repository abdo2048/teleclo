<!doctype html>
<html lang="en" dir="auto">
<head>
  <meta charset="utf-8">
  <title>Telegraph-lite · Post</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8f9fa;
      --fg: #111827;
      --fg-muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --fg: #e5e7eb;
        --fg-muted: #9ca3af;
        --border: #1e293b;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }
    header {
      margin-bottom: 1.5rem;
    }
    header h1 {
      font-size: 1.6rem;
      margin: 0 0 .25rem;
      word-break: break-word;
    }
    header p.meta {
      margin: 0;
      font-size: .85rem;
      color: var(--fg-muted);
    }
    .content {
      font-size: 1rem;
      line-height: 1.7;
      word-wrap: break-word;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .top-link {
      font-size: .85rem;
      margin-bottom: 1rem;
    }
    .content blockquote {
      margin: 1rem 0;
      padding: 0.5rem 1rem;
      border-left: 4px solid #3b82f6;
      background: #eff6ff;
      color: #1e3a8a;
      font-style: italic;
    }
    .content pre {
      background: #f1f5f9;
      padding: 0.75rem;
      border-radius: 0.25rem;
      overflow-x: auto;
      font-family: ui-monospace, 'SF Mono', 'Monaco', 'Inconsolata', monospace;
    }
    .content code {
      font-family: ui-monospace, 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      background: #f1f5f9;
      padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
      font-size: 0.875em;
    }
    .content ul {
      list-style-type: disc;
      margin-left: 1.5rem;
    }
    .content ol {
      list-style-type: decimal;
      margin-left: 1.5rem;
    }
    .content h1 {
      font-size: 2rem;
      margin: 1rem 0 0.5rem;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 0.5rem;
    }
    .content h2 {
      font-size: 1.5rem;
      margin: 1rem 0 0.5rem;
    }
    .content h3 {
      font-size: 1.25rem;
      margin: 1rem 0 0.5rem;
    }
    .content h4 {
      font-size: 1.125rem;
      margin: 0.75rem 0 0.25rem;
    }
    .content h5 {
      font-size: 1rem;
      margin: 0.75rem 0 0.25rem;
    }
    .content h6 {
      font-size: 0.875rem;
      margin: 0.5rem 0 0.25rem;
      color: #64748b;
    }
    .content img {
      max-width: 100%;
      height: auto;
      border-radius: 0.25rem;
    }
    .content hr {
      border: 0;
      border-top: 1px solid #e2e8f0;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-link">
      <a href="/">← Back</a>
    </div>
    <header>
      <h1 id="title">(loading…)</h1>
      <p class="meta" id="meta"></p>
    </header>
    <article class="content" id="content"></article>
  </div>

  <script>
    async function api(path, options) {
      const res = await fetch(path, {
        ...options,
        cache: "no-store",
        credentials: "same-origin"
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    function getIdFromQuery() {
      const p = new URLSearchParams(window.location.search);
      return p.get("id") || "";
    }

    async function loadPost() {
      const id = getIdFromQuery();
      if (!id) {
        document.getElementById("title").textContent = "Post not found";
        document.getElementById("content").textContent = "";
        return;
      }
      try {
        const data = await api("/.netlify/functions/posts?id=" + encodeURIComponent(id));
        document.title = (data.title || "Untitled") + " · Telegraph-like Platform";
        document.getElementById("title").textContent = data.title || "(untitled)";
        const dt = new Date(data.createdAt);
        document.getElementById("meta").textContent = dt.toLocaleString([], { hour12: false });
        document.getElementById("content").innerHTML = data.contentHtml || data.contentText || "";
      } catch (err) {
        console.error(err);
        document.getElementById("title").textContent = "Post not found";
        document.getElementById("meta").textContent = "";
        document.getElementById("content").textContent = "";
      }
    }

    loadPost();
  </script>
</body>
</html>
