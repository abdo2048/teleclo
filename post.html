<!doctype html>
<html lang="en" dir="auto">
<head>
  <meta charset="utf-8">
  <title>Telegraph-like Platform · Post</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafafa;
      --fg: #111827;
      --fg-muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2ca9e6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1014;
        --fg: #e5e7eb;
        --fg-muted: #9ca3af;
        --border: #1e293b;
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }
    header {
      margin-bottom: 1.5rem;
    }
    header h1 {
      font-size: 2rem;
      margin: 0 0 .25rem;
      word-break: break-word;
      font-weight: 700;
      line-height: 1.3;
    }
    header p.meta {
      margin: 0;
      font-size: .85rem;
      color: var(--fg-muted);
    }
    .content {
      font-size: 1.1rem;
      line-height: 1.6;
      word-wrap: break-word;
      padding-top: 1rem;
    }
    .top-link {
      font-size: .85rem;
      margin-bottom: 1rem;
    }
    .content blockquote {
      margin: 1.5rem 0;
      padding: 0 0 0 1rem;
      border-left: 3px solid #2ca9e6;
      color: #666;
      font-style: italic;
    }
    [dir="rtl"] .content blockquote {
      border-left: none;
      border-right: 3px solid #2ca9e6;
      padding: 0 1rem 0 0;
    }
    .content pre {
      background: #f5f5f5;
      padding: 1em;
      border-radius: 5px;
      overflow-x: auto;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .content code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      background: #f5f5f5;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-size: 0.85em;
    }
    .content ul {
      margin: 1.5rem 0;
      padding-left: 1.5rem;
    }
    [dir="rtl"] .content ul {
      padding-right: 1.5rem;
      padding-left: 0;
    }
    .content ol {
      margin: 1.5rem 0;
      padding-left: 1.5rem;
    }
    [dir="rtl"] .content ol {
      padding-right: 1.5rem;
      padding-left: 0;
    }
    .content li {
      margin: 0.5rem 0;
    }
    .content h1 {
      font-size: 2.5rem;
      margin: 0.67em 0;
      line-height: 1.2;
      font-weight: 700;
    }
    .content h2 {
      font-size: 1.7rem;
      margin: 0.83em 0;
      line-height: 1.2;
      font-weight: 700;
    }
    .content h3 {
      font-size: 1.3rem;
      margin: 1em 0;
      line-height: 1.2;
      font-weight: 700;
    }
    .content h4 {
      font-size: 1.1rem;
      margin: 1.33em 0;
      line-height: 1.2;
      font-weight: 700;
    }
    .content img {
      max-width: 100%;
      height: auto;
      margin: 1rem 0;
    }
    .content hr {
      border: 0;
      height: 1px;
      background: #e0e0e0;
      margin: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-link">
      <a href="/">← Back</a>
    </div>
    <header>
      <h1 id="title">(loading…)</h1>
      <p class="meta" id="meta"></p>
    </header>
    <article class="content" id="content"></article>
  </div>

  <script>
    async function api(path, options) {
      const res = await fetch(path, {
        ...options,
        cache: "no-store",
        credentials: "same-origin"
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    function getIdFromQuery() {
      const p = new URLSearchParams(window.location.search);
      return p.get("id") || "";
    }

    async function loadPost() {
      const id = getIdFromQuery();
      if (!id) {
        document.getElementById("title").textContent = "Post not found";
        document.getElementById("content").textContent = "";
        return;
      }
      try {
        const data = await api("/.netlify/functions/posts?id=" + encodeURIComponent(id));
        document.title = (data.title || "Untitled") + " · Telegraph-like Platform";
        document.getElementById("title").textContent = data.title || "(untitled)";
        const dt = new Date(data.createdAt);
        document.getElementById("meta").textContent = dt.toLocaleString([], { hour12: false });
        document.getElementById("content").innerHTML = data.contentHtml || data.contentText || "";
      } catch (err) {
        console.error(err);
        document.getElementById("title").textContent = "Post not found";
        document.getElementById("meta").textContent = "";
        document.getElementById("content").textContent = "";
      }
    }

    loadPost();
  </script>
</body>
</html>
